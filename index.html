<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>绘画</title>
    <!-- 引入样式库：快速美化页面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义配色（艺术清新风） -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#8B5A2B', // 艺术棕
                        accent: '#F8C8DC', // 柔粉
                        light: '#FFF9F2', // 米白背景
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .art-shadow {
                box-shadow: 0 4px 20px rgba(139, 90, 43, 0.15);
            }
            .img-hover {
                transition: transform 0.3s ease;
            }
            .img-hover:hover {
                transform: scale(1.05);
            }
        }
    </style>
</head>
<body class="bg-light text-gray-800">
    <!-- 导航栏 -->
    <header class="sticky top-0 bg-white/90 backdrop-blur-sm art-shadow z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-primary">
                <i class="fa fa-paint-brush mr-2"></i>绘画
            </h1>
            <nav class="hidden md:flex gap-6">
                <a href="#home" class="hover:text-primary font-medium">首页</a>
                <a href="#gallery" class="hover:text-primary font-medium">作品集</a>
                <a href="#about" class="hover:text-primary font-medium">关于我</a>
                <a href="#blog" class="hover:text-primary font-medium">我的博客</a>
            </nav>
            <!-- 移动端菜单 -->
            <button class="md:hidden text-xl" id="menuBtn">
                <i class="fa fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- 首页区域 -->
    <section id="home" class="min-h-[60vh] flex items-center justify-center bg-gradient-to-r from-accent/20 to-light py-16">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-primary mb-4">欢迎来到我的绘画世界</h2>
            <p class="text-lg text-gray-600 max-w-2xl mx-auto">用画笔记录生活，用色彩表达情感 | 原创绘画作品展示</p>
            <a href="#gallery" class="mt-6 inline-block bg-primary text-white px-6 py-3 rounded-full hover:bg-primary/90 transition">
                查看作品集 <i class="fa fa-arrow-right ml-1"></i>
            </a>
        </div>
    </section>

    <!-- 作品集区域 -->
    <section id="gallery" class="py-16 container mx-auto px-4">
        <h2 class="text-3xl font-bold text-center mb-10 text-primary">绘画作品集</h2>
        <!-- 作品网格 -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 作品1 -->
            <div class="bg-white rounded-lg overflow-hidden art-shadow img-hover cursor-pointer" onclick="showImage(this)">
                <img src="https://picsum.photos/800/600?random=1" alt="绘画作品1" class="w-full h-64 object-cover">
                <div class="p-4">
                    <h3 class="font-semibold">作品名称 1</h3>
                    <p class="text-sm text-gray-500">水彩 / 2025</p>
                </div>
            </div>
            <!-- 作品2 -->
            <div class="bg-white rounded-lg overflow-hidden art-shadow img-hover cursor-pointer" onclick="showImage(this)">
                <img src="https://picsum.photos/800/600?random=2" alt="绘画作品2" class="w-full h-64 object-cover">
                <div class="p-4">
                    <h3 class="font-semibold">作品名称 2</h3>
                    <p class="text-sm text-gray-500">素描 / 2025</p>
                </div>
            </div>
            <!-- 作品3 -->
            <div class="bg-white rounded-lg overflow-hidden art-shadow img-hover cursor-pointer" onclick="showImage(this)">
                <img src="https://picsum.photos/800/600?random=3" alt="绘画作品3" class="w-full h-64 object-cover">
                <div class="p-4">
                    <h3 class="font-semibold">作品名称 3</h3>
                    <p class="text-sm text-gray-500">油画 / 2025</p>
                </div>
            </div>
            <!-- 可无限复制添加作品 -->
        </div>
    </section>

    <!-- 图片预览灯箱 -->
    <div id="lightbox" class="fixed top-0 left-0 w-full h-full bg-black/90 z-50 hidden flex items-center justify-center p-4">
        <span class="absolute top-6 right-6 text-white text-3xl cursor-pointer" onclick="closeLightbox()">&times;</span>
        <img id="lightboxImg" class="max-w-full max-h-full">
    </div>

    <!-- 关于我（可编辑） -->
    <section id="about" class="py-16 bg-white">
        <div class="container mx-auto px-4 max-w-3xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-3xl font-bold text-primary">关于我</h2>
                <button id="editBtn" class="bg-accent px-4 py-2 rounded-full text-sm font-medium">
                    <i class="fa fa-edit mr-1"></i> 编辑介绍
                </button>
            </div>
            <!-- 展示区域 -->
            <div id="aboutShow" class="p-6 bg-light rounded-lg art-shadow min-h-[150px]">
                点击右上角编辑按钮，填写你的个人介绍、绘画经历、擅长风格等信息~
            </div>
            <!-- 编辑区域（默认隐藏） -->
            <textarea id="aboutEdit" class="hidden w-full p-6 rounded-lg border border-gray-200 mt-4 min-h-[150px] text-lg"></textarea>
            <button id="saveBtn" class="hidden mt-4 bg-primary text-white px-4 py-2 rounded-full">保存修改</button>
        </div>
    </section>

    <!-- 博客留言功能 -->
    <section id="blog" class="py-16 bg-light">
        <div class="container mx-auto px-4 max-w-3xl">
            <h2 class="text-3xl font-bold text-center mb-10 text-primary">我的博客 · 留言板</h2>
            <!-- 留言发布框 -->
            <div class="bg-white p-6 rounded-lg art-shadow mb-8">
                <textarea id="messageInput" placeholder="写下你的绘画心得、生活感悟、留言..." class="w-full p-3 border border-gray-200 rounded-lg min-h-[100px]"></textarea>
                <button id="sendBtn" class="mt-3 bg-primary text-white px-5 py-2 rounded-full hover:bg-primary/90">
                    <i class="fa fa-paper-plane mr-1"></i> 发布留言
                </button>
            </div>
            <!-- 留言列表 -->
            <div id="messageList" class="space-y-4">
                <p class="text-center text-gray-500">还没有留言，快来写下第一条吧~</p>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-6 text-center">
        <p>&copy; 2026 我的绘画艺术空间 | 用画笔热爱生活</p>
    </footer>

    <script>
        // ==================== 1. 作品集图片预览 ====================
        function showImage(el) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = el.querySelector('img').src;
            lightbox.classList.remove('hidden');
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.add('hidden');
        }

        // ==================== 2. 可编辑个人介绍 ====================
        const aboutShow = document.getElementById('aboutShow');
        const aboutEdit = document.getElementById('aboutEdit');
        const editBtn = document.getElementById('editBtn');
        const saveBtn = document.getElementById('saveBtn');

        // 初始化：读取本地存储的介绍
        window.onload = function() {
            const savedAbout = localStorage.getItem('myAbout');
            if(savedAbout) aboutShow.innerText = savedAbout;
            loadMessages(); // 加载留言
        }

        // 编辑按钮
        editBtn.addEventListener('click', () => {
            aboutEdit.value = aboutShow.innerText;
            aboutShow.classList.add('hidden');
            aboutEdit.classList.remove('hidden');
            saveBtn.classList.remove('hidden');
            editBtn.classList.add('hidden');
        });

        // 保存按钮
        saveBtn.addEventListener('click', () => {
            const newText = aboutEdit.value;
            aboutShow.innerText = newText;
            localStorage.setItem('myAbout', newText); // 本地保存
            
            aboutShow.classList.remove('hidden');
            aboutEdit.classList.add('hidden');
            saveBtn.classList.add('hidden');
            editBtn.classList.remove('hidden');
        });

        // ==================== 3. 博客留言功能 ====================
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messageList = document.getElementById('messageList');

        // 发布留言
        sendBtn.addEventListener('click', () => {
            const content = messageInput.value.trim();
            if(!content) return alert('请输入留言内容');

            const time = new Date().toLocaleString();
            const message = { content, time };
            
            // 保存到本地存储
            let messages = JSON.parse(localStorage.getItem('myMessages') || '[]');
            messages.unshift(message); // 最新留言在最上面
            localStorage.setItem('myMessages', JSON.stringify(messages));
            
            messageInput.value = '';
            loadMessages(); // 刷新列表
        });

        // 加载留言列表
        function loadMessages() {
            const messages = JSON.parse(localStorage.getItem('myMessages') || '[]');
            if(messages.length === 0) {
                messageList.innerHTML = '<p class="text-center text-gray-500">还没有留言，快来写下第一条吧~</p>';
                return;
            }

            let html = '';
            messages.forEach((item, index) => {
                html += `
                <div class="bg-white p-4 rounded-lg art-shadow">
                    <p class="text-gray-700">${item.content}</p>
                    <p class="text-xs text-gray-400 mt-2">${item.time}</p>
                </div>
                `;
            });
            messageList.innerHTML = html;
        }
    </script>
</body>
</html>
