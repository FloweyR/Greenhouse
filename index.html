<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人作品集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e5e7eb;line-height:1.6}
.container{max-width:1100px;margin:auto;padding:20px}
header{text-align:center;padding:60px 20px}
h1{font-size:2.8rem}
p.sub{color:#94a3b8;margin-top:10px}
nav{display:flex;justify-content:center;gap:20px;margin-top:20px;flex-wrap:wrap}
nav a{color:#38bdf8;text-decoration:none}
nav a:hover{text-decoration:underline}
.section{margin-top:40px}
.card{background:#1e293b;padding:20px;border-radius:16px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.art img{width:100%;border-radius:10px}
.timeline-item{margin-bottom:15px}
.timeline-item h4{color:#38bdf8}
.blog-post{margin-bottom:15px}
.blog-post h4{margin-bottom:5px}
textarea,input{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{margin-top:10px;padding:10px 15px;border:none;border-radius:8px;background:#38bdf8;color:#000;cursor:pointer}
footer{text-align:center;padding:40px;color:#64748b}
</style>
</head>
<body>
<div class="container">

<header>
<h1>你的名字</h1>
<p class="sub">插画师 / 个人创作者</p>
<nav>
<a href="#about">关于我</a>
<a href="#portfolio">作品集</a>
<a href="#archive">归档</a>
<a href="#blog">博客</a>
<a href="#guestbook">留言</a>
</nav>
</header>

<section id="about" class="section card">
<h2>关于我</h2>
<p>在这里写你的个人介绍、绘画方向、技能等。</p>
</section>

<section id="portfolio" class="section">
<h2>作品集</h2>
<div class="grid art">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
<img src="https://via.placeholder.com/300">
</div>
</section>

<section id="archive" class="section card">
<h2>作品归档</h2>
<div class="timeline-item">
<h4>2026年3月</h4>
<p>作品A / 作品B</p>
</div>
<div class="timeline-item">
<h4>2026年2月</h4>
<p>作品C / 作品D</p>
</div>
</section>

<section id="blog" class="section card">
<h2>博客</h2>
<div class="blog-post">
<h4>文章标题</h4>
<p>这里是文章摘要...</p>
</div>
<div class="blog-post">
<h4>文章标题</h4>
<p>这里是文章摘要...</p>
</div>
</section>

<section id="guestbook" class="section card">
<h2>留言板</h2>
<input placeholder="你的名字">
<textarea rows="4" placeholder="留言内容"></textarea>
<button onclick="alert('静态网页无法保存留言，需要后端支持')">提交</button>
</section>

<footer>
© 2026 你的名字
</footer>

</div>
</body>
</html>
